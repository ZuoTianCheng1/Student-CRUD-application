<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Student CRUD</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background: linear-gradient(135deg, #eef2f7, #e4ebf5);
            color: #2d3436;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 28px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #1f2d3d;
            letter-spacing: 0.3px;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #f7f9fc;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #e6ebf2;
        }
        form input {
            padding: 10px 12px;
            flex: 1;
            min-width: 150px;
            border: 1px solid #d7dee8;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            transition: border-color 0.15s ease;
        }
        form input:focus {
            outline: none;
            border-color: #2f6fed;
        }
        form button {
            padding: 10px 22px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s ease, background 0.15s ease;
        }
        form button:hover { background-color: #22913c; transform: translateY(-1px); }
        form button.cancel { background-color: #6c757d; }
        form button.cancel:hover { background-color: #5a6268; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6px;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #edf0f5;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: #1f2d3d;
            color: white;
            font-weight: 600;
            font-size: 12.5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        tbody tr:hover { background-color: #f7f9fc; }

        .btn-edit {
            background-color: #ffc107;
            color: black;
            border: none;
            padding: 7px 12px;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 5px;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-edit:hover { background-color: #e0a800; }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 7px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-delete:hover { background-color: #c82333; }

        .btn-loans {
            background-color: #17c1c1;
            color: black;
            border: none;
            padding: 7px 12px;
            cursor: pointer;
            border-radius: 6px;
            margin-left: 5px;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-loans:hover { background-color: #12a3a3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Management System (CRUD)</h2>

    <form id="studentForm">
        <input type="hidden" id="studentId">
        <input type="text" id="name" placeholder="Full Name" >
        <input type="email" id="email" placeholder="Email Address" >
        <input type="text" id="course" placeholder="Course" >
        <button type="submit" id="submitBtn">Add Student</button>
        <button type="button" id="cancelBtn" class="cancel" style="display:none;" onclick="resetForm()">Cancel</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>
</div>

<script>
    const API_URL = 'api.php';

    const form = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    document.addEventListener("DOMContentLoaded", fetchStudents);

    async function fetchStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        students.forEach(student => {
            tbody.innerHTML += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.course}</td>
                    <td>
                        <button class="btn-edit" onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.course}')">Edit</button>
                        <button class="btn-delete" onclick="deleteStudent(${student.id})">Delete</button>
                        <button class="btn-loans" onclick="viewLoans(${student.id})">Loans</button>
                    </td>
                </tr>
            `;
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('studentId').value;
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const course = document.getElementById('course').value;

        const payload = { name, email, course };
        let method = 'POST';

        if (id) {
            payload.id = id;
            method = 'PUT';
        }

        const response = await fetch(API_URL, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        alert(result.message || result.error);

        resetForm();
        fetchStudents();
    });

    function editStudent(id, name, email, course) {
        document.getElementById('studentId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('course').value = course;

        submitBtn.innerText = "Update Student";
        submitBtn.style.backgroundColor = "#ffc107";
        submitBtn.style.color = "black";
        cancelBtn.style.display = "inline-block";
    }

    async function deleteStudent(id) {
        if (confirm("Are you sure you want to delete this student?")) {
            const response = await fetch(API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });

            const result = await response.json();
            alert(result.message || result.error);
            fetchStudents();
        }
    }

    function viewLoans(studentId) {
       window.location.href = `loans.html?studentId=${studentId}`;
    }

    function resetForm() {
        form.reset();
        document.getElementById('studentId').value = '';
        submitBtn.innerText = "Add Student";
        submitBtn.style.backgroundColor = "#28a745";
        submitBtn.style.color = "white";
        cancelBtn.style.display = "none";
    }
</script>
</body>
</html>
